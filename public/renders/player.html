<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>导出视频预览</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #10151d;
        color: #edf1f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(430px, calc(100vw - 28px));
      }
      h1 {
        font-size: 18px;
        margin: 0 0 14px;
      }
      video {
        width: 100%;
        aspect-ratio: 9 / 16;
        background: #000;
        border-radius: 8px;
      }
      p {
        color: #aeb8c2;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>导出视频预览</h1>
      <video src="./book-guide-1778474901039.mp4" controls playsinline></video>
      <p>如果这里能播放，说明 MP4 文件正常。以后新导出的视频也在同一文件夹。</p>
    </main>
  </body>
</html>
