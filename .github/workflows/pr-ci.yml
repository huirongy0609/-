name: Pull Request CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: TypeScript, tests, GEO, and production build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SITE_URL: https://judao.club

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx --no-install tsc --noEmit --pretty false

      - name: Foundation tests
        run: npm run foundation:test

      - name: Beta tests
        run: npm run beta:test

      - name: GEO readiness
        run: npm run geo:readiness-check

      - name: Production build
        run: npm run build
